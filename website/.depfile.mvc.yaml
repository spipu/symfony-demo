deptrac:
  paths:
    - ./src
  layers:
    # MVC Layers
    - name: MVC_Command
      collectors:
        - type: classLike
          value: App\\Command\\.*
    - name: MVC_Controller
      collectors:
        - type: classLike
          value: App\\Controller\\.*
    - name: MVC_Entity
      collectors:
        - type: classLike
          value: App\\Entity\\.*
    - name: MVC_Form
      collectors:
        - type: classLike
          value: App\\Form\\[^\\]*$
    - name: MVC_FormOptions
      collectors:
        - type: classLike
          value: App\\Form\\Options\\.*
    - name: MVC_Repository
      collectors:
        - type: classLike
          value: App\\Repository\\.*
    - name: MVC_Service
      collectors:
        - type: classLike
          value: App\\(Service|Assets|Fixtures|Twig)\\.*
    - name: MVC_Step
      collectors:
        - type: classLike
          value: App\\Step\\.*
    - name: MVC_Ui
      collectors:
        - type: classLike
          value: App\\Ui\\.*
    - name: MVC_Validator
      collectors:
        - type: classLike
          value: App\\Validator\\.*

  ruleset:
    # MVC
    MVC_Command:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
      - MVC_FormOptions
    MVC_Controller:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
      - MVC_Ui
      - MVC_Form
      - MVC_FormOptions
      - MVC_Validator
    MVC_Entity:
      - MVC_Validator
      - MVC_FormOptions
    MVC_Form:
      - MVC_Entity
      - MVC_FormOptions
      - MVC_Repository
      - MVC_Service
    MVC_FormOptions:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
    MVC_Repository:
      - MVC_Entity
    MVC_Service:
      - MVC_Entity
      - MVC_Repository
      - MVC_FormOptions
      - MVC_Form
    MVC_Step:
      - MVC_Service
      - MVC_Entity
      - MVC_Repository
      - MVC_FormOptions
    MVC_Ui:
      - MVC_Entity
      - MVC_FormOptions
      - MVC_Repository
      - MVC_Service
    MVC_Validator:
      - MVC_Repository

  formatters:
    graphviz:
      point_to_groups: true
      groups: []
      hidden_layers: []
